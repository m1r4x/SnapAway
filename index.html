<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="SnapAway" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.json" />
  <title>SnapAway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e8ff47;
      --danger: #ff4747;
    }

    html, body {
      height: 100%;
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* VIDEO stays behind everything */
    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    /* CAMERA UI sits above video */
    #camera-view {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding-top: env(safe-area-inset-top, 20px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .cam-top {
      width: 100%;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .cam-hint {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 0 24px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .cam-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding-bottom: 12px;
    }

    #shutter-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.15);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    #shutter-btn:active { transform: scale(0.9); }

    #flip-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #flip-btn svg { width: 22px; height: 22px; fill: #fff; }

    .cam-spacer { width: 44px; }

    /* Flash */
    #flash {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }
    #flash.active { opacity: 1; }

    /* PREVIEW sits above everything */
    #preview-view {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
      background: #000;
    }

    #preview-img {
      flex: 1;
      width: 100%;
      object-fit: contain;
      display: block;
      min-height: 0;
    }

    .preview-bar {
      flex-shrink: 0;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 16px 24px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .preview-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      text-align: center;
    }

    .preview-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; }

    .btn-share { background: #e8ff47; color: #0a0a0a; }
    .btn-discard { background: #2a2a2a; color: #f0f0f0; }

    .warning-note {
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .warning-note span { color: #ff4747; font-weight: 600; }

    /* ERROR */
    #error-view {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 40px;
      text-align: center;
      background: #0a0a0a;
    }
    #error-view .err-icon { font-size: 48px; }
    #error-view p { color: #666; font-size: 15px; line-height: 1.5; }
    #retry-btn {
      margin-top: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: #e8ff47;
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="flash"></div>
<video id="video" autoplay playsinline muted></video>

<!-- Camera UI -->
<div id="camera-view">
  <div class="cam-top">
    <span class="app-title">SnapAway</span>
  </div>
  <p class="cam-hint">La foto viene eliminata dopo la condivisione</p>
  <div class="cam-bottom">
    <div class="cam-spacer"></div>
    <button id="shutter-btn" aria-label="Scatta foto"></button>
    <button id="flip-btn" aria-label="Cambia fotocamera">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4l-3-3-3 3h2a8 8 0 0 1 2 5.4V12h2v-2.6A10 10 0 0 0 17 4h3zM7 12v.6A10 10 0 0 0 9.5 20H7l3 3 3-3h-2A8 8 0 0 1 9 12.6V12H7z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Preview UI -->
<div id="preview-view">
  <img id="preview-img" alt="Anteprima" />
  <div class="preview-bar">
    <p class="preview-label">Cosa vuoi fare con questa foto?</p>
    <div class="preview-actions">
      <button class="btn btn-discard" id="discard-btn">🗑 Elimina</button>
      <button class="btn btn-share" id="share-btn">↑ Condividi</button>
    </div>
    <p class="warning-note">Eliminata <span>subito dopo</span> la condivisione</p>
  </div>
</div>

<!-- Error UI -->
<div id="error-view">
  <div class="err-icon">📵</div>
  <p>Impossibile accedere alla fotocamera.<br>Controlla i permessi nelle impostazioni di Safari.</p>
  <button id="retry-btn">Riprova</button>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
  const video       = document.getElementById('video');
  const canvas      = document.getElementById('canvas');
  const flash       = document.getElementById('flash');
  const cameraView  = document.getElementById('camera-view');
  const previewView = document.getElementById('preview-view');
  const errorView   = document.getElementById('error-view');
  const previewImg  = document.getElementById('preview-img');
  const shutterBtn  = document.getElementById('shutter-btn');
  const flipBtn     = document.getElementById('flip-btn');
  const shareBtn    = document.getElementById('share-btn');
  const discardBtn  = document.getElementById('discard-btn');
  const retryBtn    = document.getElementById('retry-btn');

  let stream = null;
  let facingMode = 'environment';
  let currentBlob = null;
  let currentFile = null;

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      showView('camera');
    } catch (err) {
      showView('error');
    }
  }

  function showView(name) {
    cameraView.style.display  = name === 'camera'  ? 'flex' : 'none';
    previewView.style.display = name === 'preview' ? 'flex' : 'none';
    errorView.style.display   = name === 'error'   ? 'flex' : 'none';
  }

  function triggerFlash() {
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 120);
  }

  function capturePhoto() {
    const w = video.videoWidth;
    const h = video.videoHeight;
    if (!w || !h) return;

    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    if (facingMode === 'user') {
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0, w, h);
    triggerFlash();

    canvas.toBlob(blob => {
      currentBlob = blob;
      currentFile = new File([blob], `snapaway-${Date.now()}.jpg`, { type: 'image/jpeg' });
      const url = URL.createObjectURL(blob);
      previewImg.onload = () => { showView('preview'); };
      previewImg.src = url;
    }, 'image/jpeg', 0.92);
  }

  function discardPhoto() {
    if (previewImg.src) URL.revokeObjectURL(previewImg.src);
    previewImg.src = '';
    currentBlob = null;
    currentFile = null;
    showView('camera');
  }

  function sharePhoto() {
    if (!currentFile) return;

    if (navigator.share) {
      const canShareFiles = navigator.canShare && navigator.canShare({ files: [currentFile] });
      const shareData = canShareFiles
        ? { files: [currentFile], title: 'SnapAway' }
        : { title: 'SnapAway', text: 'Foto SnapAway' };

      navigator.share(shareData)
        .catch(err => {
          if (err.name !== 'AbortError') {
            const url = URL.createObjectURL(currentBlob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 5000);
          }
        })
        .finally(() => discardPhoto());
    } else {
      const url = URL.createObjectURL(currentBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFile.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      discardPhoto();
    }
  }

  shutterBtn.addEventListener('click', capturePhoto);
  discardBtn.addEventListener('click', discardPhoto);
  shareBtn.addEventListener('click', sharePhoto);
  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });
  retryBtn.addEventListener('click', startCamera);

  startCamera();
</script>
</body>
</html>
